steps:
  # Step 1: Deploy to Cloud Functions (2nd Gen)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'functions'
      - 'deploy'
      - 'cloud-ai-bridge'
      - '--gen2'
      - '--region=us-central1'
      - '--runtime=python312'
      - '--source=.'
      - '--entry-point=extract_pdf'
      - '--trigger-http'
      - '--allow-unauthenticated'
      - '--memory=512MiB'
      - '--timeout=120s'

options:
  logging: CLOUD_LOGGING_ONLY
